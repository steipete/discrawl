<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Discrawl</title>
  <meta name="description" content="Discrawl contact page.">
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f7f5f0;
      --ink: #15181f;
      --muted: #59606c;
      --line: #d8d2c4;
      --accent: #1f7a68;
      --panel: #fffdf8;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111318;
        --ink: #f3efe7;
        --muted: #aeb5bf;
        --line: #30343d;
        --accent: #6ad6bd;
        --panel: #181b22;
      }
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px;
      background: var(--bg);
      color: var(--ink);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }

    main {
      width: min(100%, 680px);
      padding: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 6vw, 4.25rem);
      line-height: 1;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      font-size: 1.05rem;
      color: var(--muted);
    }

    a {
      color: var(--accent);
      text-decoration-thickness: 0.08em;
      text-underline-offset: 0.18em;
    }

    .contact {
      margin-top: 28px;
      padding-top: 24px;
      border-top: 1px solid var(--line);
      color: var(--ink);
      font-weight: 650;
    }
  </style>
</head>
<body>
  <main>
    <h1>Discrawl</h1>
    <p>Discord archive search and analysis tooling.</p>
    <p class="contact">Contact us: <!--email_off--><a href="mailto:steipete@gmail.com">steipete@gmail.com</a><!--/email_off--></p>
  </main>
</body>
</html>
